<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Speed NAV & Manager Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a237e; --success: #2e7d32; }
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .navbar { background: var(--primary); color: white; }
        .manager-select { background: #fffde7; border: 2px solid #ffd600; font-weight: bold; }
        .fund-row { cursor: pointer; transition: 0.2s; border-radius: 8px; margin-bottom: 8px; background: white; border: 1px solid #eee; }
        .fund-row:hover { border-color: var(--primary); background: #f0f2ff; }
        .return-pos { color: var(--success); font-weight: bold; }
        .return-neg { color: #d32f2f; font-weight: bold; }
        #chartContainer { height: 300px; background: white; padding: 15px; border-radius: 12px; }
        .loading-spinner { display: none; }
    </style>
</head>
<body>

<nav class="navbar py-3 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">📈 WealthManager Pro <small class="fs-6 opacity-75">Live 2026</small></span>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 shadow-sm border-0">
                <label class="form-label fw-bold">Select Fund Manager / House</label>
                <select id="managerDrop" class="form-select manager-select mb-3" onchange="loadManagerFunds()">
                    <option value="">-- Choose Manager --</option>
                    <option value="SBI">SBI Mutual Fund (R. Srinivasan)</option>
                    <option value="HDFC">HDFC Mutual Fund (Prashant Jain/Legacy)</option>
                    <option value="ICICI">ICICI Prudential (S. Naren)</option>
                    <option value="Nippon">Nippon India (Sailesh Raj Bhan)</option>
                    <option value="Axis">Axis Mutual Fund (Jinesh Gopani)</option>
                    <option value="Mirae">Mirae Asset (Neelesh Surana)</option>
                    <option value="Quant">Quant Mutual Fund (Sandeep Tandon)</option>
                </select>

                <div class="d-flex justify-content-between mb-2 small fw-bold text-muted">
                    <span>Scheme Name</span>
                    <span onclick="toggleSort()" style="cursor:pointer; color:var(--primary)">Sort by Return ↕</span>
                </div>
                
                <div id="fundList" style="max-height: 600px; overflow-y: auto;">
                    <p class="text-center text-muted py-5">Select a manager to view funds</p>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div id="loader" class="text-center py-5 loading-spinner">
                <div class="spinner-border text-primary"></div>
                <p>Analyzing Performance Data...</p>
            </div>

            <div id="displayArea" class="d-none">
                <div class="card p-4 border-0 shadow-sm mb-4">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h2 id="detName" class="h4 fw-bold mb-1 text-primary">Fund Name</h2>
                            <span id="detCat" class="badge bg-light text-dark border">Category</span>
                        </div>
                        <div class="text-end">
                            <div class="h2 mb-0" id="detNav">₹ 0.00</div>
                            <div class="small text-muted" id="detDate">Date</div>
                        </div>
                    </div>
                    
                    <div id="chartContainer" class="mt-4 border">
                        <canvas id="navChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="welcome" class="text-center py-5">
                <img src="https://cdn-icons-png.flaticon.com/512/3594/3594449.png" width="80" class="mb-3 opacity-25">
                <h5 class="text-muted">Select a fund to view 30-day NAV analysis</h5>
            </div>
        </div>
    </div>
</div>

<script>
    let currentFunds = [];
    let myChart = null;
    let isAsc = false;
    const PROXY = "https://api.allorigins.win/get?url=";

    async function loadManagerFunds() {
        const house = document.getElementById('managerDrop').value;
        if (!house) return;

        const listDiv = document.getElementById('fundList');
        listDiv.innerHTML = '<div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></div>';

        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://api.mfapi.in/mf/search?q=${house}`));
            const json = await res.json();
            const data = JSON.parse(json.contents).slice(0, 20); // Top 20 for speed

            // Fetch detail for each to get NAV and Return
            currentFunds = await Promise.all(data.map(async (f) => {
                const dRes = await fetch(PROXY + encodeURIComponent(`https://api.mfapi.in/mf/${f.schemeCode}`));
                const dJson = await dRes.json();
                const d = JSON.parse(dJson.contents);
                
                const latestNav = parseFloat(d.data[0].nav);
                const oldNav = parseFloat(d.data[30] ? d.data[30].nav : d.data[d.data.length-1].nav);
                const returnPct = ((latestNav - oldNav) / oldNav * 100).toFixed(2);

                return {
                    code: f.schemeCode,
                    name: f.schemeName,
                    nav: latestNav,
                    return: parseFloat(returnPct),
                    date: d.data[0].date,
                    category: d.meta.scheme_category,
                    history: d.data.slice(0, 30).reverse()
                };
            }));

            renderList();
        } catch (e) {
            listDiv.innerHTML = '<div class="alert alert-danger">Error loading data.</div>';
        }
    }

    function renderList() {
        const listDiv = document.getElementById('fundList');
        listDiv.innerHTML = currentFunds.map(f => `
            <div class="fund-row p-3 shadow-sm" onclick="displayFund(${f.code})">
                <div class="fw-bold small text-truncate">${f.name}</div>
                <div class="d-flex justify-content-between mt-2 align-items-center">
                    <span class="badge bg-light text-dark">NAV: ₹${f.nav}</span>
                    <span class="${f.return >= 0 ? 'return-pos' : 'return-neg'}">${f.return}% <small>(30d)</small></span>
                </div>
            </div>
        `).join('');
    }

    function toggleSort() {
        isAsc = !isAsc;
        currentFunds.sort((a, b) => isAsc ? a.return - b.return : b.return - a.return);
        renderList();
    }

    function displayFund(code) {
        document.getElementById('welcome').classList.add('d-none');
        document.getElementById('displayArea').classList.remove('d-none');
        
        const fund = currentFunds.find(f => f.code === code);
        document.getElementById('detName').innerText = fund.name;
        document.getElementById('detCat').innerText = fund.category;
        document.getElementById('detNav').innerText = `₹ ${fund.nav}`;
        document.getElementById('detDate').innerText = `Updated: ${fund.date}`;

        const labels = fund.history.map(h => h.date);
        const values = fund.history.map(h => h.nav);

        if (myChart) myChart.destroy();
        const ctx = document.getElementById('navChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '30 Day NAV Trend',
                    data: values,
                    borderColor: '#1a237e',
                    borderWidth: 3,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(26, 35, 126, 0.05)',
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { display: false } }
            }
        });
    }
</script>
</body>
</html>
