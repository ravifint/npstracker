<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavTrack Global | Real-Time</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #ffcc00; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .nav-header { background: var(--primary); color: white; border-bottom: 4px solid var(--accent); padding: 20px 0; }
        .search-box { margin-top: -30px; }
        .fund-card { cursor: pointer; border: none; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .fund-card:hover { transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #fffdf0; }
        .nav-big { font-size: 3.5rem; font-weight: 800; color: var(--primary); line-height: 1; }
        #results { max-height: 500px; overflow-y: auto; padding: 10px; }
    </style>
</head>
<body>

<div class="nav-header text-center">
    <div class="container">
        <h1 class="fw-bold">📊 NavTrack Global</h1>
        <p>Live Equity & Bond NAVs • All Fund Managers</p>
    </div>
</div>

<div class="container search-box">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow p-4">
                <div class="input-group">
                    <input type="text" id="query" class="form-control form-control-lg" placeholder="Search any fund (e.g. 'SBI Equity', 'HDFC Bond')">
                    <button class="btn btn-warning fw-bold px-4" onclick="searchMarket()">SEARCH</button>
                </div>
                <div id="status" class="mt-2 small text-muted text-center">Ready to search across 15,000+ schemes...</div>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-5">
            <h5 class="mb-3 text-secondary">Matching Schemes</h5>
            <div id="results">
                <div class="text-center text-muted py-5">Results will appear here</div>
            </div>
        </div>

        <div class="col-md-7">
            <div id="details" class="card shadow-sm p-4 d-none">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <span id="detCat" class="badge bg-primary mb-2">Category</span>
                        <h3 id="detName" class="h4 fw-bold">Select a Fund</h3>
                    </div>
                    <span id="detCode" class="text-muted small">Code: --</span>
                </div>
                <hr>
                <div class="text-center py-4">
                    <div class="text-muted small mb-2 uppercase fw-bold">Current Net Asset Value (NAV)</div>
                    <div id="detNav" class="nav-big">₹ 0.00</div>
                    <div id="detDate" class="mt-3 text-muted">Updating...</div>
                </div>
                <div class="p-3 bg-light rounded text-center small">
                    Tracking live data from AMC servers via AMFI
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const PROXY = "https://api.allorigins.win/get?url=";
    const API = "https://api.mfapi.in/mf";

    async function searchMarket() {
        const query = document.getElementById('query').value;
        const status = document.getElementById('status');
        const resultsDiv = document.getElementById('results');

        if (query.length < 3) {
            alert("Please type at least 3 letters.");
            return;
        }

        status.innerHTML = "🔍 Searching the entire market...";
        resultsDiv.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

        try {
            // Searching only for the specific query to keep the request small
            const searchUrl = `${API}/search?q=${encodeURIComponent(query)}`;
            const response = await fetch(PROXY + encodeURIComponent(searchUrl));
            const json = await response.json();
            const data = JSON.parse(json.contents);

            if (data.length === 0) {
                resultsDiv.innerHTML = '<div class="alert alert-warning">No funds found. Try a different name.</div>';
                status.innerHTML = "Ready.";
                return;
            }

            status.innerHTML = `Found ${data.length} matching funds.`;
            resultsDiv.innerHTML = data.slice(0, 50).map(f => `
                <div class="card fund-card p-3" onclick="getNav(${f.schemeCode})">
                    <div class="fw-bold">${f.schemeName}</div>
                    <div class="small text-muted">Code: ${f.schemeCode}</div>
                </div>
            `).join('');

        } catch (err) {
            status.innerHTML = "❌ Connection failed. Check internet.";
            resultsDiv.innerHTML = "";
        }
    }

    async function getNav(code) {
        const details = document.getElementById('details');
        details.classList.remove('d-none');
        details.style.opacity = "0.5";

        try {
            const navUrl = `${API}/${code}/latest`;
            const response = await fetch(PROXY + encodeURIComponent(navUrl));
            const json = await response.json();
            const data = JSON.parse(json.contents);

            document.getElementById('detName').innerText = data.meta.scheme_name;
            document.getElementById('detCat').innerText = data.meta.scheme_category;
            document.getElementById('detCode').innerText = `Code: ${code}`;
            document.getElementById('detNav').innerText = `₹ ${data.data[0].nav}`;
            document.getElementById('detDate').innerText = `As of: ${data.data[0].date}`;
            
            details.style.opacity = "1";
        } catch (e) {
            alert("Error fetching NAV details.");
        }
    }
</script>

</body>
</html>
