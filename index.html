<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global NAV Tracker | All Funds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --brand: #1a237e; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar { background: var(--brand); border-bottom: 4px solid #ffd600; }
        .stats-card { border: none; border-radius: 15px; background: white; transition: 0.3s; }
        .loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
        }
        .fund-item { cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .fund-item:hover { background: #e8eaf6; border-left-color: var(--brand); }
        #schemeList { max-height: 500px; overflow-y: auto; border-radius: 8px; }
        .nav-display { font-size: 2.5rem; font-weight: 700; color: var(--brand); }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
    <h5 class="text-muted">Loading All Market Funds (15,000+)...</h5>
</div>

<nav class="navbar navbar-dark py-3 mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold">🚀 NAV Global Tracker</span>
        <span class="badge bg-warning text-dark" id="totalCount">Funds: 0</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-5">
            <div class="card stats-card p-4 mb-4 shadow-sm">
                <h5 class="mb-3">Market Explorer</h5>
                <input type="text" id="marketSearch" class="form-control form-control-lg mb-3" 
                       placeholder="Type 'Equity', 'Bond', or Fund Name..." onkeyup="filterFunds()">
                
                <div class="list-group shadow-sm" id="schemeList">
                    </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div id="welcomeMessage" class="text-center py-5">
                <img src="https://cdn-icons-png.flaticon.com/512/2422/2422796.png" width="100" class="mb-3 opacity-50">
                <h4 class="text-muted">Select a fund from the list to see Live NAV</h4>
            </div>

            <div id="detailsPanel" class="card stats-card p-4 shadow-sm d-none">
                <div class="d-flex justify-content-between">
                    <span class="badge bg-primary px-3 py-2" id="detCategory">Category</span>
                    <span class="text-muted small" id="detCode">Code: --</span>
                </div>
                <h2 class="mt-3" id="detName">Fund Name</h2>
                <hr>
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <div class="text-muted small uppercase">Current Net Asset Value</div>
                        <div class="nav-display" id="detNav">₹ 0.00</div>
                        <div class="text-success fw-bold" id="detDate">Date: --</div>
                    </div>
                    <div class="col-md-6 text-center">
                        <div class="p-3 bg-light rounded-pill border">
                            <span class="text-primary">● Live Tracking Active</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let ALL_FUNDS = [];

    // 1. Initial Load: Fetch EVERY fund in the market
    window.onload = async () => {
        try {
            const response = await fetch('https://api.mfapi.in/mf');
            ALL_FUNDS = await response.json();
            
            document.getElementById('totalCount').innerText = `Funds: ${ALL_FUNDS.length.toLocaleString()}`;
            displayList(ALL_FUNDS.slice(0, 100)); // Show first 100 initially for speed
            document.getElementById('loader').style.display = 'none';
        } catch (error) {
            alert("Failed to connect to market data. Please refresh.");
        }
    };

    // 2. Display logic
    function displayList(funds) {
        const list = document.getElementById('schemeList');
        list.innerHTML = funds.map(f => `
            <button class="list-group-item list-group-item-action fund-item" 
                    onclick="viewFund(${f.schemeCode})">
                <div class="fw-bold text-truncate">${f.schemeName}</div>
                <small class="text-muted">Code: ${f.schemeCode}</small>
            </button>
        `).join('');
    }

    // 3. Search logic (Search 15,000 funds in real-time)
    function filterFunds() {
        const term = document.getElementById('marketSearch').value.toLowerCase();
        if (term.length < 2) return;

        const filtered = ALL_FUNDS.filter(f => 
            f.schemeName.toLowerCase().includes(term) || 
            f.schemeCode.toString().includes(term)
        );
        
        displayList(filtered.slice(0, 100)); // Show top 100 matches
    }

    // 4. Fetch Details for Selected Fund
    async function viewFund(code) {
        document.getElementById('welcomeMessage').classList.add('d-none');
        document.getElementById('detailsPanel').classList.remove('d-none');
        
        try {
            const res = await fetch(`https://api.mfapi.in/mf/${code}/latest`);
            const result = await res.json();
            
            const meta = result.meta;
            const live = result.data[0];

            document.getElementById('detName').innerText = meta.scheme_name;
            document.getElementById('detCategory').innerText = meta.scheme_category;
            document.getElementById('detCode').innerText = `Scheme Code: ${code}`;
            document.getElementById('detNav').innerText = `₹ ${live.nav}`;
            document.getElementById('detDate').innerText = `Dated: ${live.date}`;
        } catch (e) {
            console.error("Error loading fund details");
        }
    }
</script>

</body>
</html>
