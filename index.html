<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity & Bond Live Market Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-blue: #0d47a1; --accent-green: #2e7d32; }
        body { background-color: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, var(--primary-blue), #1976d2); color: white; padding: 40px 0; margin-bottom: 30px; }
        .search-container { margin-top: -50px; position: relative; z-index: 10; }
        .fund-card { transition: transform 0.2s; cursor: pointer; border-left: 5px solid var(--primary-blue); }
        .fund-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .nav-badge { font-size: 1.1rem; background: #e3f2fd; color: var(--primary-blue); font-weight: bold; }
        #loading-spinner { display: none; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <h1>All-India Mutual Fund Tracker</h1>
    <p>Live NAVs for Equity, Corporate Bonds, and G-Secs</p>
</div>

<div class="container search-container">
    <div class="card shadow-lg p-4">
        <div class="row g-3">
            <div class="col-md-5">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search: 'SBI Equity' or 'HDFC Bond'...">
            </div>
            <div class="col-md-4">
                <select id="assetClass" class="form-select form-select-lg">
                    <option value="">All Asset Classes</option>
                    <option value="Equity">Equity Schemes</option>
                    <option value="Debt">Corporate/Debt Bonds</option>
                    <option value="Solution">Govt/Gilt Funds</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary btn-lg w-100" onclick="searchMarket()">Search Market</button>
            </div>
        </div>
    </div>
</div>

<div class="container mt-5">
    <div id="loading-spinner" class="text-center my-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Fetching live market data from AMFI...</p>
    </div>

    <div class="row" id="resultsGrid">
        </div>
</div>

<script>
    // This function searches the entire database of 10,000+ schemes
    async function searchMarket() {
        const query = document.getElementById('searchInput').value.trim();
        const assetFilter = document.getElementById('assetClass').value;
        const grid = document.getElementById('resultsGrid');
        const loader = document.getElementById('loading-spinner');

        if (query.length < 3) {
            alert("Please enter at least 3 characters to search the entire market.");
            return;
        }

        grid.innerHTML = '';
        loader.style.display = 'block';

        try {
            // Fetching from the global search endpoint
            const response = await fetch(`https://api.mfapi.in/mf/search?q=${query}`);
            const schemes = await response.json();

            // We limit to 24 results for performance, but the API finds all matches
            const filteredSchemes = schemes.slice(0, 24);

            if (filteredSchemes.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center"><h5>No funds found matching that name.</h5></div>';
            }

            for (let scheme of filteredSchemes) {
                fetchIndividualNav(scheme.schemeCode, scheme.schemeName);
            }
        } catch (error) {
            console.error("Error fetching market data:", error);
        } finally {
            loader.style.display = 'none';
        }
    }

    // Fetches the specific latest NAV for a found scheme
    async function fetchIndividualNav(code, name) {
        try {
            const res = await fetch(`https://api.mfapi.in/mf/${code}/latest`);
            const result = await res.json();
            
            const nav = result.data[0].nav;
            const date = result.data[0].date;
            const category = result.meta.scheme_category;

            const card = `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100 fund-card p-3 shadow-sm">
                        <div class="d-flex justify-content-between">
                            <small class="text-muted">Code: ${code}</small>
                            <span class="badge bg-light text-dark">${category.split(' - ')[0]}</span>
                        </div>
                        <h6 class="mt-2 text-primary">${name}</h6>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div class="nav-badge px-3 py-1 rounded">₹ ${nav}</div>
                            <div class="text-muted small">As of: ${date}</div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('resultsGrid').innerHTML += card;
        } catch (e) {
            console.log("Could not fetch details for code " + code);
        }
    }

    // Load some popular funds on start
    window.onload = () => {
        document.getElementById('searchInput').value = "Bluechip";
        searchMarket();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
