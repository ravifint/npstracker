<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Fund Tracker 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --nav-blue: #002f6c; --gold: #ffc107; }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .navbar { background: var(--nav-blue); border-bottom: 3px solid var(--gold); }
        .card { border: none; border-radius: 12px; transition: 0.3s; }
        .fund-item { cursor: pointer; border-bottom: 1px solid #eee; padding: 12px; }
        .fund-item:hover { background: #f0f4ff; }
        #schemeList { height: 600px; overflow-y: auto; background: white; border-radius: 8px; }
        .nav-value { font-size: 3rem; font-weight: 800; color: var(--nav-blue); }
        .loading-overlay { 
            position: fixed; inset: 0; background: white; z-index: 999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-grow text-primary mb-3"></div>
    <h5 id="statusText">Connecting to Market Data...</h5>
</div>

<nav class="navbar navbar-dark py-3 mb-4 shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">📉 MarketNAV Live</span>
        <span class="badge bg-light text-dark" id="countBadge">Scanning...</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-4">
            <div class="card shadow-sm p-3 mb-4">
                <label class="form-label fw-bold">Search All Indian Funds</label>
                <input type="text" id="searchInput" class="form-control mb-3" placeholder="e.g. 'Nippon Equity' or 'ICICI Bond'" onkeyup="search()">
                <div id="schemeList" class="shadow-inner border"></div>
            </div>
        </div>

        <div class="col-lg-8">
            <div id="emptyState" class="card p-5 text-center shadow-sm">
                <h4 class="text-muted">Select a fund to view live performance</h4>
                <p>Tracking Equity, Corporate Bonds, and Govt Securities</p>
            </div>

            <div id="detailsCard" class="card p-4 shadow-sm d-none">
                <div class="d-flex justify-content-between align-items-start">
                    <h2 id="fName" class="h4">Fund Name</h2>
                    <span id="fCategory" class="badge bg-primary">Category</span>
                </div>
                <hr>
                <div class="py-4 text-center">
                    <div class="text-muted small mb-1">CURRENT NET ASSET VALUE</div>
                    <div class="nav-value" id="fNav">₹ 0.00</div>
                    <div id="fDate" class="text-muted">Updating...</div>
                </div>
                <div class="alert alert-warning small">
                    Note: NAV values are typically updated by AMCs after 9:00 PM IST on business days.
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let masterData = [];
    // Using a public CORS proxy to ensure the browser doesn't block the request
    const PROXY = "https://api.allorigins.win/raw?url=";
    const API_BASE = "https://api.mfapi.in/mf";

    async function init() {
        const loader = document.getElementById('loader');
        const status = document.getElementById('statusText');

            const response = await fetch(PROXY + encodeURIComponent(API_BASE));
            if (!response.ok) throw new Error("API Limit reached or Down");
