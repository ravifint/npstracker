<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Performance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --dark-blue: #001529; --accent: #1890ff; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: white; height: 100vh; border-right: 1px solid #ddd; overflow-y: auto; }
        .nav-pill-custom { cursor: pointer; padding: 12px; border-bottom: 1px solid #f0f0f0; transition: 0.3s; }
        .nav-pill-custom:hover { background: #e6f7ff; color: var(--accent); }
        .header-bar { background: var(--dark-blue); color: white; padding: 15px; }
        .stat-card { border-radius: 8px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .sort-btn { font-size: 0.8rem; cursor: pointer; color: var(--accent); text-decoration: underline; }
    </style>
</head>
<body>

<div class="header-bar shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h4 class="mb-0">WealthInsights 2026 | Manager Dashboard</h4>
        <div class="d-flex gap-2">
            <input type="text" id="managerInput" class="form-control form-control-sm" placeholder="Enter Manager/AMC Name (e.g. HDFC)">
            <button class="btn btn-primary btn-sm" onclick="discoverFunds()">Load Funds</button>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-4 sidebar p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="text-muted mb-0">Managed Schemes</h6>
                <div>
                    <span class="sort-btn me-2" onclick="sortFunds('name')">Name</span>
                    <span class="sort-btn" onclick="sortFunds('nav')">NAV</span>
                </div>
            </div>
            <div id="fundList">
                <div class="text-center mt-5 text-muted small">Enter a manager or AMC name above to start.</div>
            </div>
        </div>

        <div class="col-md-8 p-4">
            <div id="chartSection" class="d-none">
                <div class="card stat-card p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h2 id="displayFundName" class="h4">Select a Scheme</h2>
                            <span id="displayCategory" class="badge bg-info">Category</span>
                        </div>
                        <div class="text-end">
                            <div class="h3 mb-0 text-primary" id="displayNav">₹ 0.00</div>
                            <small class="text-muted" id="displayDate">Live NAV</small>
                        </div>
                    </div>
                    <div class="mt-4" style="height: 350px;">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>
            </div>
            <div id="placeholder" class="text-center py-5">
                <h5 class="text-muted">Select a fund from the left to view growth trends</h5>
            </div>
        </div>
    </div>
</div>

<script>
    let currentFundData = [];
    let myChart = null;
    const PROXY = "https://api.allorigins.win/get?url=";

    async function discoverFunds() {
        const query = document.getElementById('managerInput').value;
        if(query.length < 3) return alert("Please enter at least 3 characters.");
        
        const listDiv = document.getElementById('fundList');
        listDiv.innerHTML = '<div class="text-center p-5"><div class="spinner-border spinner-border-sm text-primary"></div></div>';

        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://api.mfapi.in/mf/search?q=${query}`));
            const json = await res.json();
            const data = JSON.parse(json.contents);

            // Fetch live NAV for top 15 results to enable sorting
            const enrichedData = await Promise.all(data.slice(0, 15).map(async (f) => {
                const navRes = await fetch(PROXY + encodeURIComponent(`https://api.mfapi.in/mf/${f.schemeCode}/latest`));
                const navJson = await navRes.json();
                const navData = JSON.parse(navJson.contents);
                return {
                    code: f.schemeCode,
                    name: f.schemeName,
                    nav: parseFloat(navData.data[0].nav),
                    date: navData.data[0].date,
                    category: navData.meta.scheme_category
                };
            }));

            currentFundData = enrichedData;
            renderList();
        } catch (e) {
            listDiv.innerHTML = '<div class="alert alert-danger small">Network error. Please try again.</div>';
        }
    }

    function renderList() {
        const listDiv = document.getElementById('fundList');
        listDiv.innerHTML = currentFundData.map(f => `
            <div class="nav-pill-custom" onclick="showGraph(${f.code})">
                <div class="fw-bold small text-truncate">${f.name}</div>
                <div class="d-flex justify-content-between mt-1">
                    <span class="text-muted small" style="font-size: 11px;">NAV: ₹${f.nav}</span>
                    <span class="text-primary small" style="font-size: 11px;">View Graph →</span>
                </div>
            </div>
        `).join('');
    }

    function sortFunds(type) {
        if(type === 'name') {
            currentFundData.sort((a, b) => a.name.localeCompare(b.name));
        } else {
            currentFundData.sort((a, b) => b.nav - a.nav);
        }
        renderList();
    }

    async function showGraph(code) {
        document.getElementById('placeholder').classList.add('d-none');
        document.getElementById('chartSection').classList.remove('d-none');
        
        const fund = currentFundData.find(f => f.code === code);
        document.getElementById('displayFundName').innerText = fund.name;
        document.getElementById('displayCategory').innerText = fund.category;
        document.getElementById('displayNav').innerText = `₹ ${fund.nav}`;
        document.getElementById('displayDate').innerText = `As of ${fund.date}`;

        try {
            const res = await fetch(PROXY + encodeURIComponent(`https://api.mfapi.in/mf/${code}`));
            const json = await res.json();
            const fullData = JSON.parse(json.contents);
            const history = fullData.data.slice(0, 30).reverse();

            const labels = history.map(d => d.date);
            const values = history.map(d => parseFloat(d.nav));

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('performanceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'NAV History',
                        data: values,
                        borderColor: '#1890ff',
                        backgroundColor: 'rgba(24, 144, 255, 0.1)',
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        } catch (e) { alert("Error loading graph data."); }
    }
</script>
</body>
</html>
